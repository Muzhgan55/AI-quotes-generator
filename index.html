<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <title>AI Quotes Generator</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Welcome To The AI Quotes Generator</h1>
      </header>

      <main>
        <form id="quote-generator">
          <input
            type="text"
            placeholder="Enter the topic of the Quote"
            autofocus
            required
            class="instructions"
            id="instructions"
          />
          <input type="submit" class="button" />
        </form>
        <div class="qoute" id="quote"></div>
      </main>
      <footer>
        This Project was coded by
        <a href="https://github.com/Muzhgan55/" target="_blank"
          >Muzhgan Rahimi</a
        >
        and is
        <a
          href="https://github.com/Muzhgan55/AI-quotes-generator"
          target="_blank"
        >
          open-sourced on gitHub
        </a>
        and is hosted on
        <a href="https://ai-qoutes-generator.netlify.app/" target="_blank">
          Netlify</a
        >
      </footer>
    </div>

    <script src="index.js"></script>
  </body>
</html>
